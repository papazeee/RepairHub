<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RepairHub - Profile</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>

<nav class="topbar">
  <a class="logo" href="dashboard.html">🔧 Repair<span class="dot">Hub</span></a>
  <div class="topbar-spacer"></div>
  <nav style="display:flex;gap:6px;margin-right:12px;flex-wrap:wrap">
    <a href="dashboard.html" class="btn btn-sm btn-ghost">New Request</a>
    <a href="my-orders.html" class="btn btn-sm btn-ghost">My Orders</a>
    <a href="profile.html" class="btn btn-sm btn-primary">Profile</a>
  </nav>
  <div class="user-chip">
    <div class="avatar" id="user-avatar">?</div>
    <button class="btn btn-sm btn-ghost" id="logout-btn">Logout</button>
  </div>
</nav>

<div class="page-wrapper">
  <div class="page-header">
    <h1>My Profile</h1>
    <p>Your account information and quick account summary.</p>
  </div>

  <div class="card">
    <div class="card-title">👤 Account Details</div>
    <form id="profile-form">
      <div id="profile-fields" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px"></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:16px">
        <div class="form-group">
          <label for="profile-name">Username</label>
          <input id="profile-name" type="text" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="current-password">Current Password</label>
          <input id="current-password" type="password" autocomplete="current-password" placeholder="Required only if changing password">
        </div>
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input id="new-password" type="password" autocomplete="new-password" placeholder="Leave blank to keep existing password">
        </div>
      </div>
      <div style="margin-top:14px">
        <button type="submit" class="btn btn-primary" id="profile-save-btn">
          <span class="btn-label">Save Changes</span>
          <span class="spinner hidden" id="profile-spinner"></span>
        </button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="card-title">📌 Account Summary</div>
    <div id="profile-summary" class="text-muted">Loading summary...</div>
  </div>
</div>

<script type="module" src="../scripts/profile.js"></script>
</body>
</html>
