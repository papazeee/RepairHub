<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RepairHub - Notifications</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="s-icon">🔧</div>
      Repair<span class="s-dot">Hub</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="admin.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a class="nav-item active" href="notifications.html"><span class="nav-icon">🔔</span> Notifications</a>
      <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="profile.html" style="display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:8px;text-decoration:none">
        <div class="avatar" id="admin-avatar" style="border-color:var(--brand);color:var(--brand)">A</div>
        <div style="flex:1;min-width:0">
          <div id="admin-name" style="font-size:13px;color:rgba(255,255,255,.85);font-weight:600">Admin</div>
          <div style="font-size:11px;color:rgba(255,255,255,.45)">View profile</div>
        </div>
      </a>
      <button class="btn btn-sm btn-ghost" id="logout-btn" style="width:100%;color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.15)">Logout</button>
    </div>
  </aside>

  <main class="admin-content">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div>
        <h1>Notifications</h1>
        <p>All admin alerts in one place.</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-ghost" id="refresh-btn">Refresh</button>
        <button class="btn btn-sm btn-primary" id="mark-all-btn">Mark All Read</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔔 Recent Alerts</div>
      <div id="notif-container">
        <div class="empty-state" style="padding:20px"><p>Loading notifications...</p></div>
      </div>
    </div>
  </main>
</div>

<script type="module" src="../scripts/notifications.js"></script>
</body>
</html>
