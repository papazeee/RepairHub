<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RepairHub — Sign In</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>

<div class="auth-wrapper">
  <!-- LOGIN CARD -->
  <div class="auth-card animate-in" id="login-card">
    <div class="brand-mark">
      <div class="icon">🔧</div>
      <span>RepairHub</span>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to track your repairs</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        <span class="btn-label">Sign In</span>
        <span class="spinner hidden" id="login-spinner"></span>
      </button>
    </form>
    <p class="mt-2 text-center" style="font-size:14px;color:var(--text-muted)">
      No account? <a href="#" id="go-register">Create one</a>
    </p>
    <p class="mt-1 text-center" style="font-size:13px;color:var(--text-light)">
      Admin? <a href="admin.html">Go to admin panel →</a>
    </p>
  </div>

  <!-- REGISTER CARD -->
  <div class="auth-card animate-in hidden" id="register-card">
    <div class="brand-mark">
      <div class="icon">🔧</div>
      <span>RepairHub</span>
    </div>
    <h1>Create account</h1>
    <p class="subtitle">Join to request device repairs easily</p>

    <form id="register-form">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input id="reg-name" type="text" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-phone">Phone</label>
        <input id="reg-phone" type="tel" placeholder="+1 555 000 0000" required>
      </div>
      <div class="form-group">
        <label for="reg-address">Address</label>
        <input id="reg-address" type="text" placeholder="123 Main St" required>
      </div>
      <div class="form-group">
        <label for="reg-password">Password <span style="font-weight:400;color:var(--text-muted)">(min 6 chars)</span></label>
        <input id="reg-password" type="password" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="register-btn">
        <span class="btn-label">Create Account</span>
        <span class="spinner hidden" id="register-spinner"></span>
      </button>
    </form>
    <p class="mt-2 text-center" style="font-size:14px;color:var(--text-muted)">
      Already have one? <a href="#" id="go-login">Sign in</a>
    </p>
  </div>
</div>

<script type="module" src="../scripts/index.js"></script>
</body>
</html>
